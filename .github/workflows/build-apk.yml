name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Copy Assets and Sync Capacitor
      run: |
        mkdir -p www
        cp -r src www/
        cp index.html manifest.json api-polyfill.js sw.js www/
        npx cap sync

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Commit and Push APK
      run: |
        cp android/app/build/outputs/apk/debug/app-debug.apk ./app-debug.apk
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add app-debug.apk www/
        git diff-index --quiet HEAD || git commit -m "chore: build and commit updated android apk [skip ci]"
        git push
